<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ani AI - Claude Style</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #252423;
    --bg-sidebar: #201f1e;
    --bg-input: #2d2c2b;
    --bg-button: #363534;
    --border-color: #3b3a39;
    --text-main: #eaddcc;
    --text-muted: #9c9a96;
    --accent-orange: #d96c5b;
  }
  
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 60px;
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 20px;
  }

  .sidebar-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .sidebar-icon:hover {
    background-color: var(--bg-button);
    color: var(--text-main);
  }

  .sidebar-bottom {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .avatar {
    width: 32px;
    height: 32px;
    background-color: #eaddcc;
    color: #252423;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }

  /* Main Content Layout */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    height: 100%;
  }

  /* Plan Badge */
  .plan-badge {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background-color: var(--bg-sidebar);
    border: 1px solid var(--border-color);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    z-index: 100;
  }
  .plan-badge span {
    color: var(--text-main);
  }

  /* Initial View (Centered) */
  .welcome-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s;
  }

  .greeting-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 32px;
  }

  .spark-icon {
    width: 36px;
    height: 36px;
    color: var(--accent-orange);
  }

  .greeting {
    font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    font-size: 44px;
    letter-spacing: -0.5px;
    font-weight: 400;
    color: var(--text-main);
  }

  .input-container-wrapper {
    width: 100%;
    max-width: 720px;
    padding: 0 20px;
  }

  .input-box {
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    padding: 14px 18px;
    transition: border-color 0.2s;
  }
  
  .input-box:focus-within {
    border-color: #555;
  }

  .input-top {
    display: flex;
    width: 100%;
  }

  .inp {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-main);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    min-height: 48px;
    resize: none;
  }

  .inp::placeholder {
    color: var(--text-muted);
  }

  .input-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }

  .input-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    transition: background 0.2s, color 0.2s;
  }
  
  .input-btn:hover {
    background: var(--bg-button);
    color: var(--text-main);
  }

  .model-selector {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 6px;
  }
  .model-selector:hover {
    background-color: var(--bg-button);
    color: var(--text-main);
  }

  .suggestion-chips {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .chip {
    background-color: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .chip:hover {
    background-color: var(--bg-input);
    color: var(--text-main);
    border-color: #555;
  }

  .chip svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  /* Active Chat View (Hidden Initially) */
  .chat-view {
    display: none;
    flex-direction: column;
    height: 100%;
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    padding-top: 60px;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* Custom scrollbar */
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

  .msg-row {
    display: flex;
    gap: 20px;
  }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .msg-avatar.user {
    background-color: #eaddcc;
    color: #252423;
    font-weight: 600;
    font-size: 12px;
    border-radius: 50%;
  }

  .msg-avatar.ai {
    color: var(--accent-orange);
    background: transparent;
  }
  
  .msg-avatar.ai svg {
    width: 28px;
    height: 28px;
  }

  .msg-content {
    flex: 1;
    color: var(--text-main);
    font-size: 15px;
    line-height: 1.6;
    padding-top: 4px;
  }

  .chat-input-area {
    padding: 20px;
    background: linear-gradient(0deg, var(--bg-main) 70%, transparent);
  }

  /* SVG Icons */
  svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-icon" title="Menu">
    <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
  </div>
  <div class="sidebar-icon" title="New chat">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </div>
  <div class="sidebar-icon" title="History">
    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.25 2.52.75-1.23-3.5-2.07V8z"/></svg>
  </div>
  
  <div class="sidebar-bottom">
    <div class="avatar">A</div>
  </div>
</div>

<div class="main-content">
  <div class="plan-badge">
    Free plan · <span>Upgrade</span>
  </div>

  <!-- Welcome Screen -->
  <div class="welcome-view" id="welcomeView">
    <div class="greeting-container">
      <svg class="spark-icon" viewBox="0 0 24 24">
        <path d="M11 2L12.5 8.5L19 10L12.5 11.5L11 18L9.5 11.5L3 10L9.5 8.5L11 2Z" fill="currentColor"/>
        <path d="M18 15L18.8 17.2L21 18L18.8 18.8L18 21L17.2 18.8L15 18L17.2 17.2L18 15Z" fill="currentColor"/>
      </svg>
      <div class="greeting">ANEEK returns!</div>
    </div>

    <div class="input-container-wrapper">
      <div class="input-box">
        <div class="input-top">
          <input type="text" class="inp" id="inp" placeholder="How can I help you today?" autocomplete="off"/>
        </div>
        <div class="input-bottom">
          <button class="input-btn" title="Add attachment">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          </button>
          <div style="display:flex; gap: 8px;">
            <div class="model-selector">
              Sonnet 4.6
              <svg style="width:12px; height:12px" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            <button class="input-btn">
              <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="suggestion-chips">
        <button class="chip"><svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg> Code</button>
        <button class="chip"><svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2.12-1.15V17h2V8.08L12 3z"/></svg> Learn</button>
        <button class="chip"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg> Strategize</button>
        <button class="chip"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg> Write</button>
        <button class="chip"><svg><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg> Life stuff</button>
      </div>
    </div>
  </div>

  <!-- Chat Screen (Appears after first message) -->
  <div class="chat-view" id="chatView">
    <div id="chat">
      <!-- Messages will appear here -->
    </div>
    <div class="chat-input-area">
      <div class="input-box">
        <div class="input-top">
          <input type="text" class="inp" id="chatInp" placeholder="Message Aneek..." autocomplete="off"/>
        </div>
        <div class="input-bottom">
          <button class="input-btn" title="Add attachment">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const welcomeView = document.getElementById("welcomeView");
const chatView = document.getElementById("chatView");
const chat = document.getElementById("chat");
const inp = document.getElementById("inp");
const chatInp = document.getElementById("chatInp");

let isFirstMessage = true;

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.activeElement === inp) {
      sendMessage(inp.value.trim());
    } else if (document.activeElement === chatInp) {
      sendMessage(chatInp.value.trim());
    }
  }
});

function switchToChatView() {
  if (isFirstMessage) {
    welcomeView.style.display = "none";
    chatView.style.display = "flex";
    isFirstMessage = false;
  }
}

function addMsg(text, user=false) {
  switchToChatView();

  const row = document.createElement("div");
  row.className = "msg-row";
  
  const avatar = document.createElement("div");
  avatar.className = "msg-avatar " + (user ? "user" : "ai");
  
  if (user) {
    avatar.textContent = "A";
  } else {
    avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M11 2L12.5 8.5L19 10L12.5 11.5L11 18L9.5 11.5L3 10L9.5 8.5L11 2Z" fill="currentColor"/><path d="M18 15L18.8 17.2L21 18L18.8 18.8L18 21L17.2 18.8L15 18L17.2 17.2L18 15Z" fill="currentColor"/></svg>`;
  }
  
  const content = document.createElement("div");
  content.className = "msg-content";
  content.innerHTML = text.replace(/\n/g, '<br>');
  
  row.appendChild(avatar);
  row.appendChild(content);
  
  chat.appendChild(row);
  
  scrollToBottom();
}

let typingNode = null;

function showTyping() {
  switchToChatView();
  const row = document.createElement("div");
  row.className = "msg-row";
  row.id = "typingIndicator";
  
  const avatar = document.createElement("div");
  avatar.className = "msg-avatar ai";
  avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M11 2L12.5 8.5L19 10L12.5 11.5L11 18L9.5 11.5L3 10L9.5 8.5L11 2Z" fill="currentColor"/><path d="M18 15L18.8 17.2L21 18L18.8 18.8L18 21L17.2 18.8L15 18L17.2 17.2L18 15Z" fill="currentColor"/></svg>`;
  
  const content = document.createElement("div");
  content.className = "msg-content";
  content.style.opacity = "0.6";
  content.textContent = "Typing...";
  
  row.appendChild(avatar);
  row.appendChild(content);
  
  chat.appendChild(row);
  typingNode = row;
  scrollToBottom();
}

function removeTyping() {
  if (typingNode) {
    typingNode.remove();
    typingNode = null;
  }
}

function setInputState(disabled) {
  inp.disabled = disabled;
  chatInp.disabled = disabled;
}

function scrollToBottom() {
  setTimeout(() => {
    chat.scrollTop = chat.scrollHeight;
  }, 50);
}

async function sendMessage(msgText) {
  if(!msgText) return;

  addMsg(msgText, true);
  inp.value = "";
  chatInp.value = "";
  
  setInputState(true);
  showTyping();

  try{
    const res = await fetch("http://127.0.0.1:5000/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msgText })
    });

    const data = await res.json();
    removeTyping();
    setInputState(false);
    chatInp.focus();
    
    if (res.ok && data.reply) {
      addMsg(data.reply);
    } else {
      addMsg("Error: " + (data.error || "Unknown error"));
    }

  }catch(e){
    removeTyping();
    setInputState(false);
    addMsg("Network Error: " + e.message + " (Make sure app.py is running)");
  }
}

// Support clicking on chips
document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    sendMessage(chip.textContent.trim());
  });
});
</script>
</body>
</html>
